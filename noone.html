<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>匿語 (Ni-Yu) - 森林樹洞</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --primary: #81b29a; --text: #e0e0e0; --sub: #888; --heart: #e07a5f; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; padding: 15px; }
        .container { width: 100%; max-width: 500px; }
        
        /* 輸入框 */
        .box { background: var(--card); padding: 18px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); margin-bottom: 20px; }
        textarea { width: 100%; height: 80px; background: #2a2a2a; border: 1px solid #333; border-radius: 10px; padding: 12px; box-sizing: border-box; color: white; outline: none; resize: none; font-size: 16px; }
        button#mainBtn { margin-top: 10px; padding: 12px; background: var(--primary); color: #121212; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; }

        /* 貼文卡片 */
        .post { background: var(--card); padding: 18px; border-radius: 15px; margin-bottom: 15px; position: relative; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .avatar { font-size: 24px; background: #333; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
        .post-info { display: flex; flex-direction: column; }
        .post-time { font-size: 11px; color: var(--sub); margin-top: 2px; }
        
        .post-content { line-height: 1.6; font-size: 16px; word-break: break-all; }

        /* 按鈕區 */
        .actions { display: flex; gap: 12px; border-top: 1px solid #333; padding-top: 12px; margin-top: 12px; }
        .btn { background: #2a2a2a; color: var(--sub); padding: 7px 14px; font-size: 13px; border-radius: 20px; border: none; cursor: pointer; }
        .btn.active { color: var(--heart); background: #3d2b2b; }

        /* 回覆區 */
        .reply-box { margin-top: 10px; background: #252525; padding: 10px; border-radius: 10px; display: none; }
        .r-item { font-size: 13px; padding: 6px 0; border-bottom: 1px solid #333; display: flex; gap: 8px; align-items: flex-start; }
        .r-input-group { display: flex; gap: 5px; margin-top: 10px; }
        .r-input { flex: 1; padding: 8px; background: #333; border: 1px solid #444; border-radius: 8px; color: white; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <header style="text-align: center; margin-bottom: 20px;">
            <h1 style="color: var(--primary); margin: 0; font-size: 24px;">匿語 (Ni-Yu)</h1>
            <p style="color: var(--sub); font-size: 13px;">48小時後，秘密將隨風而去</p>
        </header>

        <div class="box">
            <textarea id="postIn" placeholder="寫下現在的心情..."></textarea>
            <button id="mainBtn">發布貼文</button>
        </div>

        <div id="feed"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, set, onChildAdded, onValue, runTransaction, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5ZKo2a3q4VUjaQQDIAeQYCH12F6Yjy_4",
            authDomain: "my-anonymous-treehole.firebaseapp.com",
            databaseURL: "https://my-anonymous-treehole-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "my-anonymous-treehole"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const postRef = ref(db, 'posts');

        // 動物清單
        const animals = ['🐶','🐱','🦊','🦁','🐸','🦄','🐨','🐼','🐹','🐯','🐙','🦋'];
        
        // 取得使用者固定頭像 (基於本地ID)
        let userId = localStorage.getItem('niyu_uid');
        if(!userId) { userId = Math.random().toString(36).substring(7); localStorage.setItem('niyu_uid', userId); }
        const getAvatar = (id) => animals[Math.abs(id.split('').reduce((a,b)=>a+b.charCodeAt(0),0)) % animals.length];

        // 格式化時間
        const formatTime = (ts) => {
            if(!ts) return "";
            const d = new Date(ts);
            return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
        };

        let myLikes = JSON.parse(localStorage.getItem('myLikes')) || [];

        document.getElementById('mainBtn').onclick = () => {
            const val = document.getElementById('postIn').value.trim();
            if (val) { 
                set(push(postRef), { 
                    content: val, 
                    likes: 0, 
                    ts: serverTimestamp(),
                    uid: userId // 存入發文者ID用於生成頭像
                }); 
                document.getElementById('postIn').value = ""; 
            }
        };

        onChildAdded(postRef, (snap) => {
            const id = snap.key, data = snap.val();
            
            // --- 48小時自動消失功能 ---
            const now = Date.now();
            if (data.ts && (now - data.ts > 48 * 60 * 60 * 1000)) return; 
            // -----------------------

            const isL = myLikes.includes(id);
            const avatar = getAvatar(data.uid || id);
            const div = document.createElement('div'); div.className = 'post';
            div.innerHTML = `
                <div class="post-header">
                    <div class="avatar">${avatar}</div>
                    <div class="post-info">
                        <span style="font-size:14px; font-weight:bold; color:var(--primary)">匿名${avatar}</span>
                        <span class="post-time">${formatTime(data.ts)}</span>
                    </div>
                </div>
                <div class="post-content">${data.content}</div>
                <div class="actions">
                    <button class="btn ${isL?'active':''}" id="l-${id}">${isL?'❤️':'🤍'} <span id="c-${id}">${data.likes||0}</span></button>
                    <button class="btn" onclick="const s=document.getElementById('r-s-${id}'); s.style.display=s.style.display==='block'?'none':'block'">💬 回覆</button>
                </div>
                <div class="reply-box" id="r-s-${id}"><div id="r-l-${id}"></div>
                    <div class="r-input-group">
                        <input type="text" class="r-input" id="r-i-${id}" placeholder="留言...">
                        <button class="btn" id="r-b-${id}">送出</button>
                    </div>
                </div>`;
            document.getElementById('feed').insertBefore(div, document.getElementById('feed').firstChild);

            // 按讚與回覆邏輯
            document.getElementById(`l-${id}`).onclick = function() {
                const idx = myLikes.indexOf(id);
                runTransaction(ref(db, `posts/${id}/likes`), c => idx===-1 ? (c||0)+1 : (c||0)-1);
                if(idx===-1) { myLikes.push(id); this.classList.add('active'); this.innerHTML = `❤️ <span id="c-${id}"></span>`; }
                else { myLikes.splice(idx, 1); this.classList.remove('active'); this.innerHTML = `🤍 <span id="c-${id}"></span>`; }
                localStorage.setItem('myLikes', JSON.stringify(myLikes));
            };
            onValue(ref(db, `posts/${id}/likes`), s => { const el = document.getElementById(`c-${id}`); if(el) el.innerText = s.val()||0; });
            document.getElementById(`r-b-${id}`).onclick = () => {
                const i = document.getElementById(`r-i-${id}`); if(!i.value.trim()) return;
                push(ref(db, `posts/${id}/replies`), { c: i.value, uid: userId }); i.value = "";
            };
            onChildAdded(ref(db, `posts/${id}/replies`), s => {
                const rd = s.val();
                const ra = getAvatar(rd.uid || s.key);
                const d = document.createElement('div'); d.className='r-item'; 
                d.innerHTML=`<span>${ra}</span><span>${rd.c}</span>`;
                document.getElementById(`r-l-${id}`).appendChild(d);
            });
        });
    </script>
</body>
</html>
