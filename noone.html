<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>匿語 - 你的雲端樹洞</title>
    <style>
        :root {
            --bg: #f4f7f6;
            --primary: #6d8a78;
            --text: #333;
        }

        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 { color: var(--primary); letter-spacing: 2px; margin-bottom: 5px; }
        .subtitle { font-size: 0.9em; color: #777; }

        .container {
            width: 100%;
            max-width: 500px;
        }

        /* 輸入區域 */
        .post-box {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }

        textarea {
            width: 100%;
            height: 100px;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 10px;
            box-sizing: border-box;
            resize: none;
            font-size: 16px;
            outline: none;
        }

        button {
            margin-top: 10px;
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }

        button:active { transform: scale(0.98); }

        /* 留言列表 */
        .post {
            background: white;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            border-left: 5px solid var(--primary);
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
        }

        .post-time {
            font-size: 0.75em;
            color: #aaa;
            margin-top: 10px;
            text-align: right;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>匿語</h1>
            <p class="subtitle">拋開身份，真實地表達自我</p>
        </header>

        <div class="post-box">
            <textarea id="postInput" placeholder="在這裡寫下你的心聲..."></textarea>
            <button id="sendBtn">發布到樹洞</button>
        </div>

        <div id="postFeed">
            </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, set, onChildAdded, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // 從你的截圖中提取的 Config
        const firebaseConfig = {
            apiKey: "AIzaSyD5ZKo2a3q4VUjaQQDIAeQYCH12F6Yjy_4",
            authDomain: "my-anonymous-treehole.firebaseapp.com",
            databaseURL: "https://my-anonymous-treehole-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "my-anonymous-treehole",
            storageBucket: "my-anonymous-treehole.firebasestorage.app",
            messagingSenderId: "547306113970",
            appId: "1:547306113970:web:4b26b8a4bc6de1bfdf32ab",
            measurementId: "G-D7Y9PJZ4LY"
        };

        // 初始化 Firebase 與資料庫
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const postRef = ref(db, 'posts');

        const input = document.getElementById('postInput');
        const sendBtn = document.getElementById('sendBtn');
        const feed = document.getElementById('postFeed');

        // 發布按鈕邏輯
        sendBtn.onclick = () => {
            const content = input.value.trim();
            if (!content) {
                alert("請先寫點內容吧！");
                return;
            }

            // 產生唯一 ID 並寫入資料庫
            const newPostRef = push(postRef);
            set(newPostRef, {
                content: content,
                timestamp: serverTimestamp()
            }).then(() => {
                input.value = ""; // 成功後清空輸入框
            }).catch((error) => {
                console.error("發布失敗:", error);
                alert("發布失敗，請確認資料庫權限設定");
            });
        };

        // 即時監聽：有人發文就立刻顯示在最上方
        onChildAdded(postRef, (data) => {
            const message = data.val();
            const div = document.createElement('div');
            div.className = 'post';
            
            // 轉換時間格式
            const time = new Date().toLocaleString('zh-TW', { hour12: false });

            div.innerHTML = `
                <div>${message.content}</div>
                <div class="post-time">${time} · 來自某位路人</div>
            `;
            
            // 將新留言插入到最前面
            feed.insertBefore(div, feed.firstChild);
        });
    </script>
</body>
</html>
