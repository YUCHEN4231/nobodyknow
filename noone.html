<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>匿語 - 星空樹洞</title>
    <style>
        :root { --bg: #050505; --card: rgba(26, 26, 26, 0.8); --text: #e0e0e0; --sub: #777; --primary: #81b29a; --burn: #e07a5f; }
        
        /* 星空背景動畫 */
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; padding: 15px; min-height: 100vh; overflow-x: hidden; }
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%); overflow: hidden; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; animation: twinkle var(--duration) infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } }

        .container { width: 100%; max-width: 500px; position: relative; z-index: 1; }
        .box, .post { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid #333; margin-bottom: 20px; backdrop-filter: blur(10px); transition: 0.3s; }
        
        /* 閱後即焚樣式 */
        .post.burn-mode { border: 1px dashed var(--burn); }
        .blur-content { filter: blur(8px); user-select: none; transition: 0.5s; }
        .burn-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; width: 100%; z-index: 2; }
        .burn-btn { background: var(--burn); color: white; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-weight: bold; box-shadow: 0 0 10px rgba(224, 122, 95, 0.5); }
        .disappear { animation: smoke 1s forwards; pointer-events: none; }
        @keyframes smoke { to { opacity: 0; transform: translateY(-50px) scale(1.2); filter: blur(20px); } }

        /* 其他原有 UI */
        textarea { width: 100%; height: 80px; background: transparent; border: none; color: white; outline: none; resize: none; font-size: 16px; }
        .controls { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .burn-toggle { font-size: 13px; color: var(--sub); cursor: pointer; display: flex; align-items: center; gap: 5px; }
        button#mainBtn { background: var(--primary); color: #000; border: none; border-radius: 12px; padding: 10px 20px; cursor: pointer; font-weight: bold; }
        .primary-text { color: var(--primary); }
    </style>
</head>
<body>
    <div class="stars" id="starField"></div>

    <div class="container">
        <header style="text-align: center; margin-bottom: 30px;">
            <h1 class="primary-text" style="margin: 0; font-size: 32px; letter-spacing: 5px; text-shadow: 0 0 10px var(--primary);">匿語</h1>
            <p style="color: var(--sub); font-size: 13px; margin-top: 8px;">星光燦爛，守口如瓶</p>
        </header>

        <div class="box">
            <textarea id="postIn" maxlength="200" placeholder="寫下只有星星知道的秘密..."></textarea>
            <div class="controls">
                <label class="burn-toggle">
                    <input type="checkbox" id="burnCheck"> 🔥 閱後即焚
                </label>
                <button id="mainBtn">發布</button>
            </div>
        </div>
        <div id="feed"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, set, onChildAdded, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Firebase 配置 (請更換為你的)
        const firebaseConfig = { apiKey: "...", authDomain: "...", databaseURL: "...", projectId: "..." };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const postRef = ref(db, 'posts');

        // 生成星空
        const starField = document.getElementById('starField');
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = `${Math.random() * 100}%`;
            star.style.top = `${Math.random() * 100}%`;
            star.style.width = star.style.height = `${Math.random() * 3}px`;
            star.style.setProperty('--duration', `${2 + Math.random() * 3}s`);
            starField.appendChild(star);
        }

        const userId = localStorage.getItem('niyu_uid') || Math.random().toString(36).substring(7);
        localStorage.setItem('niyu_uid', userId);
        const animals = ['🐱','🦊','🐨','🦄','🐙','🐯','🦋'];
        const getAvatar = (id) => animals[Math.abs(id.split('').reduce((a,b)=>a+b.charCodeAt(0),0)) % animals.length];

        // 記錄已經「焚毀」的貼文 ID
        let burnedList = JSON.parse(localStorage.getItem('burned_posts')) || [];

        document.getElementById('mainBtn').onclick = () => {
            const val = document.getElementById('postIn').value.trim();
            const isBurn = document.getElementById('burnCheck').checked;
            if (val) {
                set(push(postRef), { 
                    content: val, 
                    ts: serverTimestamp(), 
                    uid: userId, 
                    isBurn: isBurn 
                });
                document.getElementById('postIn').value = "";
                document.getElementById('burnCheck').checked = false;
            }
        };

        onChildAdded(postRef, (snap) => {
            const id = snap.key, data = snap.val();
            if (data.ts && (Date.now() - data.ts > 48 * 60 * 60 * 1000)) return; // 48小時消失
            if (burnedList.includes(id)) return; // 已經焚毀的不顯示

            const div = document.createElement('div');
            div.className = `post ${data.isBurn ? 'burn-mode' : ''}`;
            div.id = `post-${id}`;

            if (data.isBurn) {
                div.innerHTML = `
                    <div class="burn-overlay" id="overlay-${id}">
                        <p style="font-size:12px; color:var(--burn); margin-bottom:10px;">🔥 極致秘密 (限時觀看)</p>
                        <button class="burn-btn" onclick="revealPost('${id}')">揭曉秘密</button>
                    </div>
                    <div class="blur-content" id="content-${id}">${data.content}</div>
                `;
            } else {
                div.innerHTML = `
                    <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
                        <span style="font-size:20px;">${getAvatar(data.uid)}</span>
                        <b class="primary-text">匿名${getAvatar(data.uid)}</b>
                    </div>
                    <div>${data.content}</div>
                `;
            }
            document.getElementById('feed').insertBefore(div, document.getElementById('feed').firstChild);
        });

        // 揭曉秘密邏輯
        window.revealPost = (id) => {
            const content = document.getElementById(`content-${id}`);
            const overlay = document.getElementById(`overlay-${id}`);
            const post = document.getElementById(`post-${id}`);

            content.style.filter = "none";
            overlay.style.display = "none";

            // 10秒後焚毀
            setTimeout(() => {
                post.classList.add('disappear');
                setTimeout(() => {
                    post.remove();
                    burnedList.push(id);
                    localStorage.setItem('burned_posts', JSON.stringify(burnedList));
                }, 1000);
            }, 10000);
        };
    </script>
</body>
</html>
