<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>匿語 - 互動森林</title>
    <style>
        :root { 
            --bg: #0f0f0f; --card: #1a1a1a; --text: #e0e0e0; --sub: #777; --heart: #e07a5f;
            --primary: #81b29a; --glow: rgba(129, 178, 154, 0.2); 
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; padding: 15px; }
        .container { width: 100%; max-width: 500px; position: relative; }
        
        .top-icons { position: absolute; width: 100%; top: 5px; display: flex; justify-content: space-between; align-items: center; }
        .icon-btn { font-size: 20px; cursor: pointer; color: var(--sub); transition: 0.3s; position: relative; }
        .dot { position: absolute; top: -2px; right: -2px; width: 8px; height: 8px; background: #ff4d4d; border-radius: 50%; display: none; border: 1px solid var(--bg); }

        .box { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid #222; margin-bottom: 25px; position: relative; }
        textarea { width: 100%; height: 80px; background: transparent; border: none; color: white; outline: none; resize: none; font-size: 16px; }
        .char-count { position: absolute; bottom: 65px; right: 25px; font-size: 11px; color: var(--sub); }
        
        button#mainBtn { background: var(--primary); color: #000; border: none; border-radius: 12px; padding: 12px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        
        .post { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid #222; margin-bottom: 20px; }
        .primary-text { color: var(--primary); }
        .post-time { font-size: 11px; color: var(--sub); }
        .btn-action { background: #252525; color: var(--sub); padding: 7px 14px; font-size: 13px; border-radius: 20px; border: none; cursor: pointer; margin-right: 10px; }
        .btn-action.active { color: var(--heart); background: #352525; }

        /* 回覆區 */
        .reply-box { margin-top: 12px; background: #151515; padding: 12px; border-radius: 12px; display: none; }
        .r-item { font-size: 13px; padding: 6px 0; border-bottom: 1px solid #222; display: flex; gap: 8px; }
        .r-input-group { display: flex; gap: 5px; margin-top: 10px; }
        .r-input { flex: 1; padding: 8px; background: #222; border: 1px solid #333; border-radius: 8px; color: white; font-size: 14px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: #1a1a1a; padding: 25px; border-radius: 25px; width: 85%; max-width: 350px; border: 1px solid #333; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-icons">
            <div class="icon-btn" onclick="openModal('settingsModal')">⚙️</div>
            <div class="icon-btn" onclick="openNoti()">🔔<div id="notiDot" class="dot"></div></div>
        </div>

        <header style="text-align: center; margin-bottom: 30px;">
            <h1 class="primary-text" style="margin: 0; font-size: 28px; letter-spacing: 4px;">匿語</h1>
            <p style="color: var(--sub); font-size: 13px; margin-top: 8px;">深夜的森林，聽你的秘密</p>
        </header>

        <div class="box">
            <textarea id="postIn" maxlength="200" placeholder="寫下心情..."></textarea>
            <div id="charCount" class="char-count">0 / 200</div>
            <button id="mainBtn">發布貼文</button>
        </div>
        <div id="feed"></div>
    </div>

    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <h3 class="primary-text">森林設定</h3>
            <input type="text" id="nameInput" placeholder="修改暱稱 (如: 憂鬱小生)" style="width:100%; padding:10px; background:#222; border:1px solid #333; color:white; border-radius:10px; margin-bottom:10px;">
            <input type="text" id="colorInput" placeholder="主題顏色 (如: pink)" style="width:100%; padding:10px; background:#222; border:1px solid #333; color:white; border-radius:10px;">
            <button id="mainBtn" onclick="saveSettings()">儲存設定</button>
            <button onclick="closeModal('settingsModal')" style="background:none; color:var(--sub); border:none; width:100%; margin-top:10px; cursor:pointer">取消</button>
        </div>
    </div>

    <div id="notiModal" class="modal">
        <div class="modal-content">
            <h3 class="primary-text">最新回響</h3>
            <div id="notiList" style="max-height:300px; overflow-y:auto; text-align:left;"></div>
            <button id="mainBtn" onclick="clearNoti()">清除並關閉</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, set, onChildAdded, onValue, runTransaction, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5ZKo2a3q4VUjaQQDIAeQYCH12F6Yjy_4",
            authDomain: "my-anonymous-treehole.firebaseapp.com",
            databaseURL: "https://my-anonymous-treehole-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "my-anonymous-treehole"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const postRef = ref(db, 'posts');

        // 初始化
        const savedColor = localStorage.getItem('niyu_theme') || '#81b29a';
        document.documentElement.style.setProperty('--primary', savedColor);
        let myPosts = JSON.parse(localStorage.getItem('myPosts')) || [];
        let myLikes = JSON.parse(localStorage.getItem('myLikes')) || [];
        let myNotis = JSON.parse(localStorage.getItem('myNotis')) || [];
        let userId = localStorage.getItem('niyu_uid') || Math.random().toString(36).substring(7);
        localStorage.setItem('niyu_uid', userId);

        const animals = ['🐶','🐱','🦊','🦁','🐸','🦄','🐨','🐼','🐹','🐯','🐙','🦋'];
        const getAvatar = (id) => animals[Math.abs(id.split('').reduce((a,b)=>a+b.charCodeAt(0),0)) % animals.length];

        const postIn = document.getElementById('postIn');
        postIn.oninput = () => document.getElementById('charCount').innerText = `${postIn.value.length} / 200`;

        // 設定儲存
        window.saveSettings = () => {
            const name = document.getElementById('nameInput').value.trim();
            const color = document.getElementById('colorInput').value.trim();
            if(name) localStorage.setItem('niyu_name', name);
            if(color) localStorage.setItem('niyu_theme', color);
            location.reload();
        };

        // 發布
        document.getElementById('mainBtn').onclick = () => {
            const val = postIn.value.trim();
            if (val) {
                const nRef = push(postRef);
                set(nRef, { content: val, likes: 0, ts: serverTimestamp(), uid: userId, uName: localStorage.getItem('niyu_name') || "" });
                myPosts.push(nRef.key);
                localStorage.setItem('myPosts', JSON.stringify(myPosts));
                postIn.value = ""; location.reload();
            }
        };

        onChildAdded(postRef, (snap) => {
            const id = snap.key, data = snap.val();
            if (data.ts && (Date.now() - data.ts > 48 * 60 * 60 * 1000)) return;

            const isLiked = myLikes.includes(id);
            const div = document.createElement('div'); div.className = 'post';
            div.innerHTML = `
                <div style="display:flex; align-items:center; gap:10px; margin-bottom:12px;">
                    <div style="font-size:20px; background:#252525; padding:8px; border-radius:50%">${getAvatar(data.uid)}</div>
                    <div><b class="primary-text">${data.uName || '匿名'}${getAvatar(data.uid)}</b><br><span class="post-time">${new Date(data.ts).toLocaleString()}</span></div>
                </div>
                <div style="line-height:1.6;">${data.content}</div>
                <div style="margin-top:15px; border-top:1px solid #252525; padding-top:12px;">
                    <button class="btn-action ${isLiked?'active':''}" id="l-${id}">${isLiked?'❤️':'🤍'} <span id="c-${id}">${data.likes||0}</span></button>
                    <button class="btn-action" onclick="const s=document.getElementById('r-box-${id}'); s.style.display=s.style.display==='block'?'none':'block'">💬 回覆</button>
                </div>
                <div class="reply-box" id="r-box-${id}">
                    <div id="r-list-${id}"></div>
                    <div class="r-input-group">
                        <input type="text" class="r-input" id="r-in-${id}" placeholder="悄悄回覆...">
                        <button class="btn-action" style="background:var(--primary); color:#000" id="r-btn-${id}">送出</button>
                    </div>
                </div>`;
            document.getElementById('feed').insertBefore(div, document.getElementById('feed').firstChild);

            // 按讚收回邏輯
            document.getElementById(`l-${id}`).onclick = function() {
                const idx = myLikes.indexOf(id);
                runTransaction(ref(db, `posts/${id}/likes`), c => (idx === -1) ? (c||0)+1 : (c||0)-1);
                if(idx === -1) { myLikes.push(id); this.classList.add('active'); this.innerText = `❤️`; }
                else { myLikes.splice(idx, 1); this.classList.remove('active'); this.innerText = `🤍`; }
                localStorage.setItem('myLikes', JSON.stringify(myLikes));
            };
            onValue(ref(db, `posts/${id}/likes`), s => { if(document.getElementById(`c-${id}`)) document.getElementById(`c-${id}`).innerText = s.val()||0; });

            // 回覆邏輯
            document.getElementById(`r-btn-${id}`).onclick = () => {
                const ri = document.getElementById(`r-in-${id}`); if(!ri.value.trim()) return;
                push(ref(db, `posts/${id}/replies`), { c: ri.value, uid: userId, uName: localStorage.getItem('niyu_name') || "" });
                ri.value = "";
            };
            onChildAdded(ref(db, `posts/${id}/replies`), s => {
                const rd = s.val();
                const d = document.createElement('div'); d.className='r-item';
                d.innerHTML=`<span style="font-size:16px">${getAvatar(rd.uid)}</span><span style="color:var(--primary); font-weight:bold">${rd.uName || '匿名'}:</span><span>${rd.c}</span>`;
                document.getElementById(`r-list-${id}`).appendChild(d);
            });
        });

        // 彈窗控制與通知 (略同前版但整合更深)
        window.openModal = (m) => document.getElementById(m).style.display = 'flex';
        window.closeModal = (m) => document.getElementById(m).style.display = 'none';
        window.openNoti = () => { openModal('notiModal'); }; 
        window.clearNoti = () => { myNotis = []; localStorage.setItem('myNotis', JSON.stringify([])); location.reload(); };
    </script>
</body>
</html>
