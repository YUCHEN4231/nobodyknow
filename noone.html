<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>匿語 - 星空樹洞</title>
    <style>
        :root { 
            --bg: #050505; --card: rgba(26, 26, 26, 0.85); --text: #e0e0e0; --sub: #777; 
            --heart: #e07a5f; --burn: #ff4d4d; --primary: #81b29a; 
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; padding: 15px; min-height: 100vh; overflow-x: hidden; }
        
        /* 星空背景 */
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%); overflow: hidden; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; animation: twinkle var(--duration) infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } }

        .container { width: 100%; max-width: 500px; position: relative; z-index: 1; }
        .top-icons { position: absolute; width: 100%; top: 5px; display: flex; justify-content: space-between; align-items: center; }
        .icon-btn { font-size: 20px; cursor: pointer; color: var(--sub); position: relative; transition: 0.3s; }
        .dot { position: absolute; top: -2px; right: -2px; width: 8px; height: 8px; background: #ff4d4d; border-radius: 50%; display: none; }

        .box, .post { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid #333; margin-bottom: 20px; backdrop-filter: blur(10px); position: relative; transition: 0.4s; }
        .post:hover { border-color: var(--primary); }
        
        /* 閱後即焚特效 */
        .burn-mode { border: 1px dashed var(--burn) !important; }
        .blur-content { filter: blur(10px); transition: 0.8s; user-select: none; }
        .burn-btn { background: var(--burn); color: white; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .disappear { animation: smoke 1s forwards; pointer-events: none; }
        @keyframes smoke { to { opacity: 0; transform: translateY(-40px) scale(1.1); filter: blur(20px); } }

        textarea { width: 100%; height: 80px; background: transparent; border: none; color: white; outline: none; resize: none; font-size: 16px; }
        .controls { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; border-top: 1px solid #333; padding-top: 10px; }
        button#mainBtn { background: var(--primary); color: #000; border: none; border-radius: 12px; padding: 8px 20px; cursor: pointer; font-weight: bold; }
        
        .btn-action { background: #252525; color: var(--sub); padding: 7px 14px; font-size: 13px; border-radius: 20px; border: none; cursor: pointer; margin-right: 10px; transition: 0.3s; }
        .btn-action.active { color: var(--heart); background: #352525; }

        /* 回覆區 */
        .reply-box { margin-top: 12px; background: rgba(20,20,20,0.6); padding: 12px; border-radius: 12px; display: none; }
        .r-item { font-size: 13px; padding: 6px 0; border-bottom: 1px solid #333; display: flex; gap: 8px; }

        /* 彈窗 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: #1a1a1a; padding: 25px; border-radius: 25px; width: 85%; max-width: 350px; border: 1px solid #333; text-align: center; }
    </style>
</head>
<body>
    <div class="stars" id="starField"></div>
    <div class="container">
        <div class="top-icons">
            <div class="icon-btn" onclick="openModal('settingsModal')">⚙️</div>
            <div class="icon-btn" onclick="openNoti()">🔔<div id="notiDot" class="dot"></div></div>
        </div>

        <header style="text-align: center; margin-bottom: 30px;">
            <h1 style="color:var(--primary); margin:0; font-size:28px; letter-spacing:4px; text-shadow:0 0 10px var(--primary);">匿語</h1>
            <p style="color:var(--sub); font-size:12px; margin-top:5px;">星光燦爛，守口如瓶</p>
        </header>

        <div class="box">
            <textarea id="postIn" maxlength="200" placeholder="寫下心情..."></textarea>
            <div class="controls">
                <label style="font-size:13px; color:var(--sub); cursor:pointer"><input type="checkbox" id="burnCheck"> 🔥 閱後即焚</label>
                <button id="mainBtn">發布</button>
            </div>
        </div>
        <div id="feed"></div>
    </div>

    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <h3 style="color:var(--primary)">森林設定</h3>
            <input type="text" id="nameInput" placeholder="修改暱稱" style="width:100%; padding:10px; background:#222; border:1px solid #444; color:white; border-radius:10px; margin-bottom:10px;">
            <input type="text" id="colorInput" placeholder="主題顏色 (如: gold)" style="width:100%; padding:10px; background:#222; border:1px solid #444; color:white; border-radius:10px;">
            <button id="mainBtn" onclick="saveSettings()">儲存並應用</button>
            <button onclick="closeModal('settingsModal')" style="background:none; color:var(--sub); border:none; width:100%; margin-top:10px; cursor:pointer">取消</button>
        </div>
    </div>

    <div id="notiModal" class="modal">
        <div class="modal-content">
            <h3 style="color:var(--primary)">回響通知</h3>
            <div id="notiList" style="max-height:300px; overflow-y:auto; text-align:left;"></div>
            <button id="mainBtn" onclick="clearNoti()">清除並關閉</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, set, onChildAdded, onValue, runTransaction, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyD5ZKo2a3q4VUjaQQDIAeQYCH12F6Yjy_4", authDomain: "my-anonymous-treehole.firebaseapp.com", databaseURL: "https://my-anonymous-treehole-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "my-anonymous-treehole" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const postRef = ref(db, 'posts');

        // 初始化
        const savedColor = localStorage.getItem('niyu_theme') || '#81b29a';
        document.documentElement.style.setProperty('--primary', savedColor);
        let myPosts = JSON.parse(localStorage.getItem('myPosts')) || [];
        let myLikes = JSON.parse(localStorage.getItem('myLikes')) || [];
        let myNotis = JSON.parse(localStorage.getItem('myNotis')) || [];
        let burnedList = JSON.parse(localStorage.getItem('burned_posts')) || [];
        let userId = localStorage.getItem('niyu_uid') || Math.random().toString(36).substring(7);
        localStorage.setItem('niyu_uid', userId);

        // 星空生成
        const starField = document.getElementById('starField');
        for (let i = 0; i < 80; i++) {
            const star = document.createElement('div'); star.className = 'star';
            star.style.left = Math.random() * 100 + '%'; star.style.top = Math.random() * 100 + '%';
            star.style.width = star.style.height = Math.random() * 2 + 'px';
            star.style.setProperty('--duration', (2 + Math.random() * 3) + 's');
            starField.appendChild(star);
        }

        window.saveSettings = () => {
            const name = document.getElementById('nameInput').value.trim();
            const color = document.getElementById('colorInput').value.trim();
            if(name) localStorage.setItem('niyu_name', name);
            if(color) localStorage.setItem('niyu_theme', color);
            location.reload();
        };

        const animals = ['🐱','🦊','🐨','🦄','🐙','🐯','🦋'];
        const getAvatar = (id) => animals[Math.abs(id.split('').reduce((a,b)=>a+b.charCodeAt(0),0)) % animals.length];

        document.getElementById('mainBtn').onclick = () => {
            const val = document.getElementById('postIn').value.trim();
            const isBurn = document.getElementById('burnCheck').checked;
            if (val) {
                const nRef = push(postRef);
                set(nRef, { content: val, likes: 0, ts: serverTimestamp(), uid: userId, uName: localStorage.getItem('niyu_name') || "", isBurn: isBurn });
                myPosts.push(nRef.key); localStorage.setItem('myPosts', JSON.stringify(myPosts));
                document.getElementById('postIn').value = ""; location.reload();
            }
        };

        onChildAdded(postRef, (snap) => {
            const id = snap.key, data = snap.val();
            if (data.ts && (Date.now() - data.ts > 48 * 60 * 60 * 1000)) return;
            if (burnedList.includes(id)) return;

            const isLiked = myLikes.includes(id);
            const div = document.createElement('div'); div.className = `post ${data.isBurn?'burn-mode':''}`; div.id = `post-${id}`;
            
            let contentHtml = data.isBurn ? 
                `<div id="burn-ol-${id}" style="text-align:center; padding:10px;">
                    <p style="color:var(--burn); font-size:12px;">🔥 極致秘密 (看後消失)</p>
                    <button class="burn-btn" onclick="revealBurn('${id}')">揭曉</button>
                 </div><div class="blur-content" id="bc-${id}">${data.content}</div>` : 
                `<div>${data.content}</div>`;

            div.innerHTML = `
                <div style="display:flex; align-items:center; gap:10px; margin-bottom:12px;">
                    <div style="font-size:20px;">${getAvatar(data.uid)}</div>
                    <div><b style="color:var(--primary)">${data.uName || '匿名'}${getAvatar(data.uid)}</b></div>
                </div>
                ${contentHtml}
                <div style="margin-top:15px; border-top:1px solid rgba(255,255,255,0.1); padding-top:12px;">
                    <button class="btn-action ${isLiked?'active':''}" id="l-${id}"><span>${isLiked?'❤️ ':'🤍 '}</span><span id="c-${id}">${data.likes||0}</span></button>
                    <button class="btn-action" onclick="const s=document.getElementById('r-box-${id}'); s.style.display=s.style.display==='block'?'none':'block'">💬 回覆</button>
                </div>
                <div class="reply-box" id="r-box-${id}"><div id="r-list-${id}"></div>
                    <div style="display:flex; gap:5px; margin-top:10px;">
                        <input type="text" class="r-input" id="r-in-${id}" placeholder="留言..."><button class="btn-action" id="r-btn-${id}">送出</button>
                    </div>
                </div>`;
            document.getElementById('feed').insertBefore(div, document.getElementById('feed').firstChild);

            // 讚與收回邏輯
            document.getElementById(`l-${id}`).onclick = function() {
                const idx = myLikes.indexOf(id);
                runTransaction(ref(db, `posts/${id}/likes`), c => (idx === -1) ? (c||0)+1 : (c||0)-1);
                if(idx === -1) { myLikes.push(id); this.classList.add('active'); this.firstChild.innerText = '❤️ '; }
                else { myLikes.splice(idx, 1); this.classList.remove('active'); this.firstChild.innerText = '🤍 '; }
                localStorage.setItem('myLikes', JSON.stringify(myLikes));
            };
            onValue(ref(db, `posts/${id}/likes`), s => { if(document.getElementById(`c-${id}`)) document.getElementById(`c-${id}`).innerText = s.val()||0; });

            // 回覆
            document.getElementById(`r-btn-${id}`).onclick = () => {
                const ri = document.getElementById(`r-in-${id}`); if(!ri.value.trim()) return;
                push(ref(db, `posts/${id}/replies`), { c: ri.value, uid: userId, uName: localStorage.getItem('niyu_name') || "" }); ri.value = "";
            };
            onChildAdded(ref(db, `posts/${id}/replies`), s => {
                const rd = s.val(), d = document.createElement('div'); d.className='r-item';
                d.innerHTML=`<span>${getAvatar(rd.uid)}</span><b style="color:var(--primary)">${rd.uName||'匿名'}:</b><span>${rd.c}</span>`;
                document.getElementById(`r-list-${id}`).appendChild(d);
            });
        });

        // 揭曉秘密功能
        window.revealBurn = (id) => {
            document.getElementById(`bc-${id}`).style.filter = "none";
            document.getElementById(`burn-ol-${id}`).style.display = "none";
            setTimeout(() => {
                document.getElementById(`post-${id}`).classList.add('disappear');
                setTimeout(() => { burnedList.push(id); localStorage.setItem('burned_posts', JSON.stringify(burnedList)); location.reload(); }, 1000);
            }, 10000);
        };

        window.openModal = (m) => document.getElementById(m).style.display = 'flex';
        window.closeModal = (m) => document.getElementById(m).style.display = 'none';
        window.openNoti = () => openModal('notiModal');
        window.clearNoti = () => { myNotis = []; localStorage.setItem('myNotis', JSON.stringify([])); location.reload(); };
    </script>
</body>
</html>
